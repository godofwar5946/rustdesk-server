name: build

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-[0-9]+'

env:
  CARGO_TERM_COLOR: always
  LATEST_TAG: latest

  # 只推送到你自己的 GHCR，不推送 RustDesk 官方地址
  GHCR_IMAGE: ghcr.io/godofwar5946/rustdesk-server-s6
  GHCR_IMAGE_CLASSIC: ghcr.io/godofwar5946/rustdesk-server


jobs:

  # ============================================================
  # Linux AMD64 build
  # ============================================================
  build:

    name: Build - amd64
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive


      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.90"
          override: true
          default: true
          components: rustfmt
          profile: minimal
          target: x86_64-unknown-linux-musl


      # 解决：
      # Failed to find tool. Is `musl-gcc` installed?
      #
      # musl-tools 提供 musl-gcc
      # pkg-config / libssl-dev 用于 OpenSSL 相关依赖
      # build-essential / perl / cmake 用于本地 C/C++ 和部分 vendored 依赖
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            musl-tools \
            pkg-config \
            libssl-dev \
            build-essential \
            perl \
            cmake

          echo "===== musl-gcc ====="
          which musl-gcc
          musl-gcc --version


      - name: Build
        uses: actions-rs/cargo@v1
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        with:
          command: build
          args: --release --all-features --target=x86_64-unknown-linux-musl
          use-cross: false


      - name: Make binaries executable
        run: |
          chmod -v a+x target/x86_64-unknown-linux-musl/release/hbbs
          chmod -v a+x target/x86_64-unknown-linux-musl/release/hbbr
          chmod -v a+x target/x86_64-unknown-linux-musl/release/rustdesk-utils


      - name: Publish Linux AMD64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-amd64
          path: |
            target/x86_64-unknown-linux-musl/release/hbbr
            target/x86_64-unknown-linux-musl/release/hbbs
            target/x86_64-unknown-linux-musl/release/rustdesk-utils
          if-no-files-found: error



  # ============================================================
  # Windows AMD64 build
  # ============================================================
  build-win:

    name: Build - windows-amd64
    runs-on: windows-2022

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive


      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.90"
          override: true
          default: true
          components: rustfmt
          profile: minimal
          target: x86_64-pc-windows-msvc


      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --all-features --target=x86_64-pc-windows-msvc
          use-cross: false


      - name: Install NSIS
        run: |
          iwr -useb get.scoop.sh -outfile 'install.ps1'
          .\install.ps1 -RunAsAdmin
          scoop update
          scoop bucket add extras
          scoop install nsis


      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16


      - name: Build UI browser file
        run: |
          npm i
          npm run build
        working-directory: ./ui/html


      - name: Build UI setup file
        run: |
          rustup default nightly
          cargo build --release

          xcopy /y ..\target\x86_64-pc-windows-msvc\release\*.exe setup\bin\
          xcopy /y target\release\*.exe setup\

          mkdir setup\logs

          makensis /V1 setup.nsi

          mkdir SignOutput

          mv RustDeskServer.Setup.exe SignOutput\
          mv ..\target\x86_64-pc-windows-msvc\release\*.exe SignOutput\
        working-directory: ./ui


      - name: Publish Windows AMD64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-x86_64
          path: |
            ui\SignOutput\hbbr.exe
            ui\SignOutput\hbbs.exe
            ui\SignOutput\rustdesk-utils.exe
            ui\SignOutput\RustDeskServer.Setup.exe
          if-no-files-found: error



  # ============================================================
  # GitHub Release
  #
  # 仅在 push tag 时执行。
  # workflow_dispatch 手动执行时不会创建 Release，
  # 但仍然可以从 Actions 的 Artifacts 下载文件。
  # ============================================================
  release:

    name: GitHub release

    needs:
      - build
      - build-win

    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false

      matrix:
        job:
          - {
              os: "linux",
              name: "amd64",
              suffix: ""
            }

          - {
              os: "windows",
              name: "x86_64",
              suffix: "-unsigned"
            }

    steps:

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.job.os }}-${{ matrix.job.name }}
          path: ${{ matrix.job.name }}


      - name: Pack files
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

          zip -r \
            ${{ matrix.job.name }}/rustdesk-server-${{ matrix.job.os }}-${{ matrix.job.name }}${{ matrix.job.suffix }}.zip \
            ${{ matrix.job.name }}/*


      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            ${{ matrix.job.name }}/rustdesk-server-${{ matrix.job.os }}-${{ matrix.job.name }}${{ matrix.job.suffix }}.zip



  # ============================================================
  # S6 Docker AMD64
  #
  # 只推送：
  # ghcr.io/godofwar5946/rustdesk-server-s6
  #
  # 不推送：
  # ghcr.io/rustdesk/*
  # Docker Hub
  # ============================================================
  docker:

    name: Docker S6 - amd64

    needs:
      - build

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive


      - name: Download Linux AMD64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: docker/rootfs/usr/bin


      - name: Make binaries executable
        run: |
          chmod -v a+x docker/rootfs/usr/bin/*


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2


      - name: Log in to personal GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.GHCR_IMAGE }}


      - name: Get image tags
        shell: bash
        run: |
          T="${GITHUB_REF_NAME//\//-}"

          echo "GIT_TAG=$T" >> "$GITHUB_ENV"

          if [[ "$T" =~ ^v?([0-9]+)\. ]]; then
            echo "MAJOR_TAG=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"
          else
            echo "MAJOR_TAG=$T" >> "$GITHUB_ENV"
          fi


      - name: Build and push S6 Docker image
        uses: docker/build-push-action@v5
        with:
          context: "./docker"
          platforms: linux/amd64
          push: true
          provenance: false

          build-args: |
            S6_ARCH=x86_64

          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}
            ${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}

          labels: ${{ steps.meta.outputs.labels }}



  # ============================================================
  # Classic Docker AMD64
  #
  # 只推送：
  # ghcr.io/godofwar5946/rustdesk-server
  # ============================================================
  docker-classic:

    name: Docker Classic - amd64

    needs:
      - build

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive


      - name: Download Linux AMD64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: docker-classic/


      - name: Make binaries executable
        run: |
          chmod -v a+x docker-classic/*


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2


      - name: Log in to personal GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.GHCR_IMAGE_CLASSIC }}


      - name: Get image tags
        shell: bash
        run: |
          T="${GITHUB_REF_NAME//\//-}"

          echo "GIT_TAG=$T" >> "$GITHUB_ENV"

          if [[ "$T" =~ ^v?([0-9]+)\. ]]; then
            echo "MAJOR_TAG=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"
          else
            echo "MAJOR_TAG=$T" >> "$GITHUB_ENV"
          fi


      - name: Build and push Classic Docker image
        uses: docker/build-push-action@v5
        with:
          context: "./docker-classic"
          platforms: linux/amd64
          push: true
          provenance: false

          tags: |
            ${{ env.GHCR_IMAGE_CLASSIC }}:${{ env.LATEST_TAG }}
            ${{ env.GHCR_IMAGE_CLASSIC }}:${{ env.GIT_TAG }}

          labels: ${{ steps.meta.outputs.labels }}



  # ============================================================
  # Debian AMD64 package
  # ============================================================
  deb-package:

    name: Debian package - amd64

    needs:
      - build

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive


      - name: Create packaging environment
        run: |
          sudo apt-get update

          DEBIAN_FRONTEND=noninteractive \
          sudo apt-get install -y \
            devscripts \
            build-essential \
            debhelper \
            pkg-config

          mkdir -p debian-build/amd64/bin


      - name: Download Linux AMD64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: debian-build/amd64/bin


      - name: Build AMD64 DEB packages
        run: |
          chmod -v a+x debian-build/amd64/bin/*

          cp -vr debian systemd debian-build/amd64/

          cat debian/control.tpl \
            | sed 's/{{ ARCH }}/amd64/' \
            > debian-build/amd64/debian/control

          cd debian-build/amd64/

          debuild -i -us -uc -b -aamd64


      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-amd64
          path: |
            debian-build/rustdesk-server-hbbr_*_amd64.deb
            debian-build/rustdesk-server-hbbs_*_amd64.deb
            debian-build/rustdesk-server-utils_*_amd64.deb
          if-no-files-found: error


      - name: Add DEB packages to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            debian-build/rustdesk-server-hbbr_*_amd64.deb
            debian-build/rustdesk-server-hbbs_*_amd64.deb
            debian-build/rustdesk-server-utils_*_amd64.deb
